<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Performance Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f7fc;
    font-family:Arial;
}

.container{
    margin-top:50px;
}

.card{
    border:none;
    border-radius:20px;
    box-shadow:0 5px 25px rgba(0,0,0,.1);
}

.header{
    background:#2563eb;
    color:white;
    padding:20px;
    border-radius:20px 20px 0 0;
}

.form-control{
    height:50px;
    border-radius:10px;
}

.btn-primary{
    height:50px;
    font-size:18px;
}

.result{
    margin-top:30px;
    text-align:center;
}

.result h1{
    color:#2563eb;
    font-size:50px;
}
</style>

</head>

<body>

<div class="container">
<div class="row justify-content-center">
<div class="col-md-8">

<div class="card">

<div class="header">
<h2> Student Performance Dashboard</h2>
</div>

<div class="p-4">

<form action="/predict" method="POST">

<div class="row">

<div class="col-md-6 mb-3">
<label>Study Hours</label>
<input type="number" step="0.1" name="study_hours" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Attendance</label>
<input type="number" step="0.1" name="attendance" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Sleep Hours</label>
<input type="number" step="0.1" name="sleep_hours" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Previous Grade</label>
<input type="number" step="0.1" name="previous_grade" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Assignments Completed</label>
<input type="number" step="0.1" name="assignments_completed" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Practice Tests Taken</label>
<input type="number" step="0.1" name="practice_tests_taken" class="form-control" required>
</div>

</div>

<button type="submit" class="btn btn-primary w-100">
Predict Performance
</button>

</form>

<div class="result">
<h3>Prediction Result</h3>

{% if prediction is defined %}
    <h1>{{ prediction }}</h1>
{% else %}
    <p>Fill the form and submit to see a result.</p>
{% endif %}

</div>

</div>

</div>
</div>
</div>
</div>

</body>
</html>
